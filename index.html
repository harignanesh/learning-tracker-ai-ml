<!DOCTYPE html>
<html>
<head>

<title>AI Learning OS v8</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<style>

body{
font-family:Inter;
margin:0;
color:white;
background:linear-gradient(135deg,#020617,#0f172a);
display:flex;
}

#particles{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

.sidebar{
width:250px;
background:rgba(15,23,42,0.8);
backdrop-filter:blur(12px);
padding:25px;
height:100vh;
border-right:1px solid rgba(255,255,255,0.1);
}

.sidebar button{
display:flex;
align-items:center;
gap:10px;
width:100%;
padding:12px;
margin-bottom:12px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.05);
color:white;
cursor:pointer;
transition:0.3s;
}

.sidebar button:hover{
background:#3b82f6;
transform:translateX(5px);
}

.main{
flex:1;
padding:40px;
}

.hero{
margin-bottom:30px;
}

.quote{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:14px;
backdrop-filter:blur(10px);
}

.bento{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:20px;
}

.card{
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:16px;
backdrop-filter:blur(10px);
box-shadow:0 10px 30px rgba(0,0,0,0.5);
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 20px 50px rgba(0,0,0,0.7);
}

.progressbar{
height:12px;
background:#1e293b;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.progress{
height:12px;
background:linear-gradient(90deg,#22c55e,#06b6d4);
width:65%;
}

canvas{
margin-top:20px;
}

</style>
</head>

<body>

<div id="particles"></div>

<div class="sidebar">

<h2>AI OS</h2>

<button>🏠 Dashboard</button>
<button>🧠 Roadmap</button>
<button>🚀 Projects</button>
<button>📊 Analytics</button>

</div>

<div class="main">

<div class="hero">

<h1>AI Learning OS</h1>
<p>Become a Professional AI Engineer</p>

<div class="quote">
“AI engineers don't just train models — they build intelligent systems.”
</div>

</div>

<div class="bento">

<div class="card">
<h3>Concepts Learned</h3>
<h1>24</h1>
</div>

<div class="card">
<h3>Projects Built</h3>
<h1>6</h1>
</div>

<div class="card">
<h3>Study Streak</h3>
<h1>11 days</h1>
</div>

<div class="card">
<h3>Skill Radar</h3>
<canvas id="radar"></canvas>
</div>

<div class="card">
<h3>Roadmap Progress</h3>
<div class="progressbar"><div class="progress"></div></div>
</div>

</div>

</div>

<script>

tsParticles.load("particles",{
particles:{
number:{value:50},
color:{value:"#3b82f6"},
links:{enable:true,color:"#3b82f6"},
move:{enable:true,speed:1}
}
})

new Chart(document.getElementById("radar"),{
type:'radar',
data:{
labels:["Python","ML","Deep Learning","LLMs","Agents","MLOps"],
datasets:[{
label:"Skill Level",
data:[85,70,55,40,30,20]
}]
}
})

</script>

</body>
</html>
