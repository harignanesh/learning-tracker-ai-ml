<!DOCTYPE html>
<html>
<head>

<title>AI Learning OS</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Inter;
background:#0f172a;
color:white;
margin:0;
display:flex;
}

.sidebar{
width:250px;
background:#1e293b;
padding:20px;
height:100vh;
}

.sidebar button{
width:100%;
padding:10px;
margin-bottom:10px;
background:#334155;
border:none;
color:white;
cursor:pointer;
}

.main{
flex:1;
padding:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.hero{
margin-bottom:30px;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>AI Learning OS</h2>

<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('roadmap')">Roadmap</button>
<button onclick="show('projects')">Projects</button>
<button onclick="show('analytics')">Analytics</button>

</div>

<div class="main">

<div class="hero">

<h1>AI Learning OS</h1>

<p>Your Personal AI Engineer Training Platform</p>

<div class="card">

<p>
“AI engineers don't just train models —
they build intelligent systems.”
</p>

</div>

</div>

<div id="dashboard">

<div class="grid">

<div class="card">
<h3>Concepts Learned</h3>
<h1>12</h1>
</div>

<div class="card">
<h3>Projects Built</h3>
<h1>2</h1>
</div>

<div class="card">
<h3>Study Streak</h3>
<h1>5 days</h1>
</div>

<div class="card">
<h3>Hours Studied</h3>
<h1>18</h1>
</div>

</div>

</div>

<div id="analytics" style="display:none">

<div class="card">

<h3>Skill Radar</h3>

<canvas id="radar"></canvas>

</div>

</div>

</div>

<script>

function show(page){

document.getElementById("dashboard").style.display="none"
document.getElementById("analytics").style.display="none"

document.getElementById(page).style.display="block"

}

new Chart(document.getElementById("radar"),{

type:'radar',

data:{
labels:["Python","ML","DL","LLMs","Agents","MLOps"],
datasets:[{
label:"Skill Level",
data:[80,60,40,30,20,10]
}]
}

})

</script>

</body>
</html>
