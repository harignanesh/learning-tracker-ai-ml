<!DOCTYPE html>
<html>
<head>

<title>AI Learning OS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Inter;
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
margin:0;
display:flex;
overflow:hidden;
}

.sidebar{
width:260px;
background:rgba(30,41,59,0.8);
backdrop-filter:blur(10px);
padding:20px;
height:100vh;
box-shadow:0 0 40px rgba(0,0,0,0.4);
}

.sidebar h2{
margin-bottom:20px;
}

.sidebar button{
width:100%;
padding:12px;
margin-bottom:12px;
background:#334155;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
transition:0.3s;
}

.sidebar button:hover{
background:#3b82f6;
transform:translateX(5px);
}

.main{
flex:1;
padding:40px;
overflow:auto;
}

.hero{
margin-bottom:40px;
}

.quote{
background:rgba(30,41,59,0.6);
padding:20px;
border-radius:12px;
margin-top:15px;
backdrop-filter:blur(6px);
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

.card{
background:rgba(30,41,59,0.7);
padding:25px;
border-radius:14px;
transition:0.4s;
box-shadow:0 0 25px rgba(0,0,0,0.3);
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

.progressbar{
height:12px;
background:#1e293b;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.progress{
height:12px;
background:linear-gradient(90deg,#3b82f6,#06b6d4);
width:60%;
animation:progress 2s ease;
}

@keyframes progress{
from{width:0}
to{width:60%}
}

canvas{
background:#0f172a;
border-radius:12px;
padding:10px;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>AI Learning OS</h2>

<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('roadmap')">Roadmap</button>
<button onclick="show('projects')">Projects</button>
<button onclick="show('analytics')">Analytics</button>

</div>

<div class="main">

<div class="hero">

<h1>AI Learning OS</h1>
<p>Become a Professional AI Engineer</p>

<div class="quote">

“AI engineers don’t just train models —
they build intelligent systems.”

</div>

</div>

<div id="dashboard">

<div class="grid">

<div class="card">
<h3>Concepts Learned</h3>
<h1>24</h1>
</div>

<div class="card">
<h3>Projects Built</h3>
<h1>4</h1>
</div>

<div class="card">
<h3>Study Streak</h3>
<h1>9 Days</h1>
</div>

<div class="card">
<h3>Learning Hours</h3>
<h1>62</h1>
</div>

</div>

<div class="card">

<h3>Roadmap Progress</h3>

<div class="progressbar">
<div class="progress"></div>
</div>

</div>

</div>

<div id="analytics" style="display:none">

<div class="grid">

<div class="card">

<h3>Skill Radar</h3>
<canvas id="radar"></canvas>

</div>

<div class="card">

<h3>Learning Progress</h3>
<canvas id="progressChart"></canvas>

</div>

</div>

</div>

</div>

<script>

function show(page){

document.getElementById("dashboard").style.display="none"
document.getElementById("analytics").style.display="none"

document.getElementById(page).style.display="block"

}

new Chart(document.getElementById("radar"),{

type:'radar',

data:{
labels:["Python","ML","Deep Learning","LLMs","Agents","MLOps"],
datasets:[{
label:"Skill Level",
data:[80,70,50,40,30,20]
}]
}

})

new Chart(document.getElementById("progressChart"),{

type:'line',

data:{
labels:["Week1","Week2","Week3","Week4"],
datasets:[{
label:"Concepts Learned",
data:[4,8,14,24]
}]
}

})

</script>

</body>
</html>
