<!DOCTYPE html>
<html>
<head>

<title>AI Learning OS v7</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<style>

body{
font-family:Inter;
margin:0;
color:white;
background:linear-gradient(135deg,#020617,#0f172a,#020617);
overflow:hidden;
display:flex;
}

#particles{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

.sidebar{
width:260px;
background:rgba(30,41,59,0.6);
backdrop-filter:blur(12px);
padding:20px;
height:100vh;
border-right:1px solid rgba(255,255,255,0.1);
}

.sidebar h2{
margin-bottom:25px;
}

.sidebar button{
width:100%;
padding:12px;
margin-bottom:12px;
background:rgba(255,255,255,0.05);
border:none;
border-radius:10px;
color:white;
cursor:pointer;
transition:0.3s;
}

.sidebar button:hover{
background:#3b82f6;
transform:translateX(6px);
}

.main{
flex:1;
padding:40px;
overflow:auto;
}

.hero{
margin-bottom:30px;
}

.quote{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:14px;
backdrop-filter:blur(10px);
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-top:20px;
}

.card{
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:16px;
backdrop-filter:blur(10px);
box-shadow:0 10px 30px rgba(0,0,0,0.4);
transition:0.4s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 25px 50px rgba(0,0,0,0.6);
}

.progressbar{
height:12px;
background:#1e293b;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.progress{
height:12px;
background:linear-gradient(90deg,#22c55e,#06b6d4);
width:65%;
animation:load 2s ease;
}

@keyframes load{
from{width:0}
to{width:65%}
}

canvas{
margin-top:20px;
background:rgba(0,0,0,0.2);
border-radius:12px;
}

</style>

</head>

<body>

<div id="particles"></div>

<div class="sidebar">

<h2>AI Learning OS</h2>

<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('roadmap')">Roadmap</button>
<button onclick="show('projects')">Projects</button>
<button onclick="show('analytics')">Analytics</button>

</div>

<div class="main">

<div class="hero">

<h1>AI Learning OS</h1>
<p>Become a Professional AI Engineer</p>

<div class="quote">
“AI engineers don’t just train models — they build intelligent systems.”
</div>

</div>

<div id="dashboard">

<div class="grid">

<div class="card">
<h3>Concepts Learned</h3>
<h1>24</h1>
</div>

<div class="card">
<h3>Projects Built</h3>
<h1>6</h1>
</div>

<div class="card">
<h3>Study Streak</h3>
<h1>11 Days</h1>
</div>

<div class="card">
<h3>Learning Hours</h3>
<h1>82</h1>
</div>

</div>

<div class="card">

<h3>Roadmap Progress</h3>

<div class="progressbar">
<div class="progress"></div>
</div>

</div>

</div>

<div id="analytics" style="display:none">

<div class="grid">

<div class="card">

<h3>Skill Radar</h3>
<canvas id="radar"></canvas>

</div>

<div class="card">

<h3>Learning Progress</h3>
<canvas id="progressChart"></canvas>

</div>

</div>

</div>

</div>

<script>

function show(page){
document.getElementById("dashboard").style.display="none"
document.getElementById("analytics").style.display="none"
document.getElementById(page).style.display="block"
}

new Chart(document.getElementById("radar"),{
type:'radar',
data:{
labels:["Python","ML","Deep Learning","LLMs","Agents","MLOps"],
datasets:[{
label:"Skill Level",
data:[85,70,55,40,35,20]
}]
}
})

new Chart(document.getElementById("progressChart"),{
type:'line',
data:{
labels:["Week1","Week2","Week3","Week4"],
datasets:[{
label:"Concepts Learned",
data:[4,10,18,24]
}]
}
})

tsParticles.load("particles",{
particles:{
number:{value:60},
color:{value:"#3b82f6"},
links:{enable:true,color:"#3b82f6"},
move:{enable:true,speed:1}
}
})

</script>

</body>
</html>
